<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GenLayer SignalGuard Demo</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, Arial, sans-serif;
      color: #172033;
      background: #f7f8fb;
    }
    body {
      margin: 0;
      padding: 32px;
    }
    main {
      max-width: 980px;
      margin: 0 auto;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 32px;
    }
    p {
      line-height: 1.55;
      color: #4c566a;
    }
    section {
      margin-top: 22px;
      padding: 22px;
      border: 1px solid #e2e6ef;
      border-radius: 8px;
      background: white;
    }
    label {
      display: block;
      margin: 14px 0 6px;
      font-weight: 700;
    }
    input, textarea {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #cdd4e3;
      border-radius: 6px;
      padding: 12px;
      font: inherit;
    }
    textarea {
      min-height: 180px;
      resize: vertical;
    }
    button {
      margin-top: 16px;
      border: 0;
      border-radius: 6px;
      background: #f58220;
      color: white;
      padding: 12px 16px;
      font-weight: 800;
      cursor: pointer;
    }
    pre {
      overflow: auto;
      padding: 16px;
      border-radius: 6px;
      background: #121826;
      color: #e6edf7;
    }
  </style>
</head>
<body>
  <main>
    <h1>GenLayer SignalGuard</h1>
    <p>
      Build a GenLayer contract-call payload for source-grounded claim review.
      The Intelligent Contract fetches the source URL, asks AI validators to assess
      the claim, and stores the accepted verdict report.
    </p>

    <section>
      <label for="claim">Claim</label>
      <textarea id="claim">GenLayer Intelligent Contracts can access web data and use AI-validator consensus for subjective decisions.</textarea>

      <label for="source">Source URL</label>
      <input id="source" value="https://docs.genlayer.com/understand-genlayer-protocol/what-is-genlayer">

      <button id="build">Build review_claim payload</button>
      <pre id="output">{}</pre>
    </section>
  </main>

  <script>
    const claimInput = document.querySelector("#claim");
    const sourceInput = document.querySelector("#source");
    const output = document.querySelector("#output");

    document.querySelector("#build").addEventListener("click", () => {
      const payload = {
        method: "review_claim",
        args: {
          claim: claimInput.value.trim(),
          source_url: sourceInput.value.trim()
        }
      };
      output.textContent = JSON.stringify(payload, null, 2);
    });
  </script>
</body>
</html>
